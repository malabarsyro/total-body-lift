<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Total Body Lift</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<style>
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#0f172a;
  color:white;
}

.header {
  font-size:28px;
  font-weight:700;
  padding:20px;
  text-align:center;
}

.container {
  padding:20px;
  padding-bottom:100px;
}

.card {
  background:#1e293b;
  border-radius:20px;
  padding:20px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.card input {
  width:70px;
  margin-left:10px;
  background:#0f172a;
  border:none;
  border-radius:8px;
  padding:5px;
  color:white;
}

.add-btn {
  width:100%;
  padding:16px;
  border:none;
  border-radius:20px;
  background:#3b82f6;
  color:white;
  font-size:16px;
  font-weight:600;
}

.tabs {
  position:fixed;
  bottom:0;
  width:100%;
  background:#111827;
  display:flex;
  justify-content:space-around;
  padding:12px 0;
  border-top:1px solid #1f2937;
}

.tab {
  text-align:center;
  font-size:12px;
  color:#9ca3af;
}

.tab.active {
  color:white;
  font-weight:600;
}

.modal {
  display:none;
  position:fixed;
  z-index:1000;
  left:0;top:0;width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#1e293b;
  border-radius:20px;
  padding:20px;
  max-width:400px;
  width:90%;
  max-height:80%;
  overflow-y:auto;
}

.category {
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.exercise-item {
  padding:10px;
  background:#111827;
  margin-bottom:8px;
  border-radius:12px;
  cursor:pointer;
}

.exercise-item:hover {
  background:#3b82f6;
}
</style>
</head>

<body>

<div class="header">Total Body Lift</div>

<div class="container" id="workoutList"></div>

<div class="container">
<button class="add-btn" onclick="openModal()">+ Add Exercise</button>
</div>

<div class="tabs">
<div class="tab active">🏋️ Workout</div>
<div class="tab">📊 Progress</div>
<div class="tab">⚙️ Settings</div>
</div>

<!-- Exercise Modal -->
<div class="modal" id="exerciseModal">
  <div class="modal-content">
    <h3>Select Exercise</h3>
    <div id="categories"></div>
    <div id="exerciseItems"></div>
    <button class="add-btn" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
// Exercise Database
const exerciseDatabase = {
  "Chest": ["Bench Press", "Incline DB Press", "Chest Fly"],
  "Back": ["Lat Pulldown", "Row", "Pull-Up"],
  "Shoulders": ["DB Shoulder Press", "Lateral Raise", "Front Raise"],
  "Arms": ["Bicep Curl", "Hammer Curl", "Tricep Pushdown", "Overhead Tricep Extension"],
  "Legs": ["Squat", "Leg Press", "Hack Squat", "Goblet Squat"],
  "Core": ["Plank", "Russian Twist", "Cable Crunch"]
};

let workouts = JSON.parse(localStorage.getItem("workouts")) || [];

function save() {
  localStorage.setItem("workouts", JSON.stringify(workouts));
  render();
}

// Render Workout List
function render() {
  const list = document.getElementById("workoutList");
  list.innerHTML = "";
  workouts.forEach((w,i)=>{
    let card = document.createElement("div");
    card.className="card";
    card.innerHTML = `
      <strong>${w.name}</strong><br><br>
      Weight <input type="number" value="${w.weight}" onchange="update(${i},'weight',this.value)">
      Sets <input type="number" value="${w.sets}" onchange="update(${i},'sets',this.value)">
      Reps <input type="number" value="${w.reps}" onchange="update(${i},'reps',this.value)">
    `;
    list.appendChild(card);
  });
}

// Update field
function update(index,field,value){
  workouts[index][field] = Number(value);
  save();
}

// Modal Functions
function openModal(){
  const modal = document.getElementById("exerciseModal");
  modal.style.display = "flex";
  const categoriesDiv = document.getElementById("categories");
  categoriesDiv.innerHTML = "";
  Object.keys(exerciseDatabase).forEach(cat=>{
    let btn = document.createElement("button");
    btn.innerText = cat;
    btn.className = "add-btn";
    btn.style.marginBottom="10px";
    btn.onclick = ()=>showExercises(cat);
    categoriesDiv.appendChild(btn);
  });
}

function closeModal(){
  const modal = document.getElementById("exerciseModal");
  modal.style.display = "none";
  document.getElementById("exerciseItems").innerHTML = "";
}

// Show exercises in category
function showExercises(category){
  const div = document.getElementById("exerciseItems");
  div.innerHTML = "";
  exerciseDatabase[category].forEach(ex=>{
    let item = document.createElement("div");
    item.className = "exercise-item";
    item.innerText = ex;
    item.onclick = ()=>{
      workouts.push({name:ex,weight:0,sets:3,reps:10});
      save();
      closeModal();
    };
    div.appendChild(item);
  });
}

render();
</script>

</body>
</html>
